security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            id: App\Security\AppUserProvider

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # ✅ Firewall unique pour le login JWT
        api_login:
            pattern: ^/api/auth/login
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # ✅ Firewall pour toutes les autres routes API
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

        # ✅ Firewall principal (web)
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_auth_login
                check_path: app_auth_login
                default_target_path: app_article_list
                use_referer: true
            logout:
                path: app_auth_logout
                target: app_article_list
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800
                path: /

    access_control:
        # Routes publiques
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/articles, roles: PUBLIC_ACCESS, methods: [GET] }

        # Routes API privées
        - { path: ^/api/orders, roles: ROLE_USER }
        - { path: ^/api/prices, roles: ROLE_USER }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

        # Routes web
        - { path: ^/(fr|en)/admin, roles: ROLE_ADMIN }
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/register$, roles: PUBLIC_ACCESS }
        - { path: ^/forgot-password, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/user, roles: ROLE_USER }
        - { path: ^/checkout, roles: PUBLIC_ACCESS }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10