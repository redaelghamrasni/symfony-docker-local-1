# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
  locale: 'en'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
    
    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones
    App\EventListener\ArticleNotFoundListener:
        tags:
            - { name: 'kernel.event_subscriber'}

    App\EventListener\LocaleSubscriber:
        arguments:
            $defaultLocale: '%kernel.default_locale%'
            $supportedLocales: ['en', 'fr']
        tags:
            - { name: 'kernel.event_subscriber' }

    App\EventListener\TimezoneListener:
        arguments:
            $appTimezone: '%env(APP_TIMEZONE)%'
        tags:
            - { name: 'kernel.event_subscriber' }

    App\EventListener\EntityNotFoundListener:
        arguments:
            $container: '@service_container'
            $twig: '@twig'
        tags:
            - { name: 'kernel.event_subscriber' }

    App\EventSubscriber\CartPreserveOnLogoutSubscriber:
        tags:
            - { name: kernel.event_subscriber, dispatcher: security.event_dispatcher.main }

    App\Service\CartService:
        public: true

    App\Service\PayPalService:
        arguments:
            $clientId:    '%env(PAYPAL_CLIENT_ID)%'
            $secret:      '%env(PAYPAL_SECRET)%'
            $environment: '%env(PAYPAL_ENV)%'

    App\Service\ShippingService:
        arguments:
            $apiKey: '%env(SHIPPO_API_KEY)%'
        public: true
        
    # Rendre le service accessible dans Twig
    cart_service:
        alias: App\Service\CartService
        public: true

    #Meilisearch service
    App\Service\MeilisearchService:
        arguments:
            $meilisearchUrl: 'http://localhost:7700'
            $apiKey: 'changeme_master_key_dev'