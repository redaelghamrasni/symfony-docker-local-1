services:
###> doctrine/doctrine-bundle ###
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: symfony_database
      MYSQL_USER: symfony_user
      MYSQL_PASSWORD: reda1234
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "symfony_user", "--password=reda1234"]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - "3307:3306"
    volumes:
      - database_data:/var/lib/mysql:rw
###< doctrine/doctrine-bundle ###

###> symfony/mailer ###
  mailer:
    image: axllent/mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
###< symfony/mailer ###

###> redis ###
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
###< redis ###

###> meilisearch ###
  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: changeme_master_key_dev
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
###< meilisearch ###

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
###< doctrine/doctrine-bundle ###

###> redis ###
  redis_data:
###< redis ###

###> meilisearch ###
  meili_data:
###< meilisearch ###
